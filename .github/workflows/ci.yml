name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-node:
    name: Test on Node.js
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22', '24']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build library
        run: pnpm build

  test-rust:
    name: Test Rust WASM Crate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wasm/target
          key: cargo-${{ runner.os }}-${{ hashFiles('wasm/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Run Rust tests
        working-directory: ./wasm
        run: cargo test

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM
        working-directory: ./wasm
        run: wasm-pack build --target web --release

  build-test:
    name: Build Artifact Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm build

      - name: Test CJS build
        run: |
          node -e "const lib = require('./dist/index.cjs'); console.log('CJS parse:', typeof lib.parse === 'function'); console.log('CJS deserialize:', typeof lib.deserialize === 'function')"

      - name: Test ESM build
        run: |
          node -e "import('./dist/index.js').then(lib => { console.log('ESM parse:', typeof lib.parse === 'function'); console.log('ESM deserialize:', typeof lib.deserialize === 'function') })"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit

      - name: Run dependency scan
        uses: actions/dependency-review-action@v3
        if: github.event_name == 'pull_request'
